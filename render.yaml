services:
  - type: web
    name: aim-companion
    runtime: docker
    plan: starter
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: mistralai/mistral-7b-instruct
    disk:
      name: chroma-data
      mountPath: /app/chroma_data
      sizeGB: 1
