services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./corpus:/app/corpus
      - chroma-data:/app/chroma_data
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-mistralai/mistral-7b-instruct}
    restart: unless-stopped

volumes:
  chroma-data:
