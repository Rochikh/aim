services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./corpus:/app/corpus
      - chroma-data:/app/chroma_data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  chroma-data:
